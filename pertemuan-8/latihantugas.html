<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>latihantugas form</title>
</head>

<body>
    <pre>
        <form action="">
            <font color="blue">
                <h2 align="center">Free Registration</h3>
            </font>
    Nama        : <input type="text">

    Tgl Lahir   : <input type="number" size="3"> / <input type="number" size="3"> / <input type="number" size="3">

    Alamat      : <textarea name="alamt"></textarea>

    Kota        : <input type="text" name="kota">

    Pekerjaan   : <select name="pekerjaan">
                    <option value="Dosen">Dosen</option>
                    <option value="Pedagan">Pedagang</option>
                    <option value="Petani">Petani</option>
                </select>

    J. Kelamin  : <input type="radio" name="jkelamin" value="laki-laki">Laki-Laki <input type="radio" name="jkelamin" value="perempuan">Perempuan

    Hobby       : <input type="checkbox" name="hobby" value="Membaca">Membaca
                  <input type="checkbox" name="hobby" value="Menulis">Menulis
                  <input type="checkbox" name="hobby" value="Olahraga">Olahraga
                  <input type="checkbox" name="hobby" value="Renang">Renang

                <input type="submit" value="Kirim"> <input type="reset" value="Cancel">
    </form>
    </pre>
